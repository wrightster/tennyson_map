  body {

    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  .map-container {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 32px 40px 28px;
    max-width: 1320px;
    width: 95vw;

  .map-header {
    text-align: center;
    margin-bottom: 18px;
  }

  .map-header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: 32px;
    letter-spacing: 3px;
    color: #3a4a2e;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .map-header h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 5px;
    color: #7a8a6a;
    text-transform: uppercase;
  }

  .map-header .divider {
    width: 80px;
    height: 2px;
    background: #b5c5a0;
    margin: 10px auto;
  }

  svg { display: block; width: 100%; height: auto; }

  .map-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #e0ddd6;
    font-size: 10px;
    color: #999;
    letter-spacing: 1px;
