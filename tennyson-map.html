<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennyson Neighborhood</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f1eb;
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #2c3e28;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    color: #a8c490;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .meta {
    font-size: 11px;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .toolbar {
    background: #fff;
    border-bottom: 1px solid #e0ddd6;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid #c5bfb2;
    background: #fff;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    color: #555;
  }
  .btn:hover { border-color: #3a4a2e; color: #3a4a2e; }
  .btn.active { background: #3a4a2e; color: #fff; border-color: #3a4a2e; }
  .legend {
    display: flex;
    gap: 14px;
    margin-left: auto;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.5px;
  }
  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  .map-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #eae6dc;
  }
  svg {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  svg:active { cursor: grabbing; }

  .road-fill {
    fill: none;
    stroke: #cac4b4;
    stroke-width: 28;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .road-edge {
    fill: none;
    stroke: #b5ad9e;
    stroke-width: 1;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .stream-tob {
    fill: none;
    stroke: #7aabbf;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .stream-buffer {
    fill: none;
    stroke: #7aabbf;
    stroke-width: 1;
    stroke-dasharray: 6,3;
    opacity: 0.6;
  }
  .easement {
    fill: none;
    stroke: #e6a800;
    stroke-width: 1.5;
    stroke-dasharray: 5,3;
    opacity: 0.5;
  }
  .lot {
    fill: #ccd9b8;
    stroke: #8a9e72;
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.15s, stroke-width 0.15s;
  }
  .lot:hover {
    fill: #b8cda0;
    stroke-width: 2.5;
    stroke: #6a8a52;
  }
  .lot.selected {
    stroke: #2c3e28;
    stroke-width: 3;
    filter: drop-shadow(0 0 6px rgba(44,62,40,0.4));
  }
  .lot.available { fill: #ccd9b8; }
  .lot.sold { fill: #e8c0b8; }
  .lot.reserved { fill: #e8dca0; }
  .lot.dimmed { opacity: 0.2; }

  .lot-label-group { pointer-events: none; }
  .lot-label-num {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    fill: #3a4a2e;
    text-anchor: middle;
    dominant-baseline: middle;
    letter-spacing: 0.5px;
  }
  .lot-label-acres {
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 400;
    fill: #6b7a5a;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  .info-panel {
    width: 260px;
    background: #fff;
    border-left: 1px solid #e0ddd6;
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    color: #3a4a2e;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .placeholder { color: #aaa; font-size: 12px; line-height: 1.6; }
  .lot-info { display: none; }
  .lot-info.show { display: block; }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0ede8;
    font-size: 12px;
  }
  .info-key { color: #999; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .info-value { font-weight: 600; color: #3a4a2e; }
  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    margin: 12px 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-available { background: #d4edda; color: #1a6030; border: 1px solid #8a9e72; }
  .badge-sold { background: #f0d0d0; color: #7a1010; border: 1px solid #c08080; }
  .badge-reserved { background: #fff3cd; color: #7a5c00; border: 1px solid #d4b84a; }
  .status-btns { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .status-btn {
    padding: 6px 14px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 16px;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.12s;
  }
  .status-btn-available { background: #d4edda; border: 1.5px solid #8a9e72; color: #1a6030; }
  .status-btn-available:hover { background: #b0d8b0; }
  .status-btn-sold { background: #f0d0d0; border: 1.5px solid #c08080; color: #7a1010; }
  .status-btn-sold:hover { background: #e0a0a0; }
  .status-btn-reserved { background: #fff3cd; border: 1.5px solid #d4b84a; color: #7a5c00; }
  .status-btn-reserved:hover { background: #f0e090; }

  .stats-bar {
    background: #fff;
    border-top: 1px solid #e0ddd6;
    padding: 8px 24px;
    display: flex;
    gap: 28px;
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .stat-num { font-weight: 700; color: #3a4a2e; }

  .zoom-controls {
    position: absolute;
    bottom: 20px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    z-index: 10;
  }
  .zoom-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid #c5bfb2;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color: #555;
  }
  .zoom-btn:hover { background: #f0f4e8; border-color: #3a4a2e; color: #3a4a2e; }

  .export-note { font-size: 10px; color: #bbb; margin-top: 20px; line-height: 1.5; }
</style>
</head>

  <span>Available: <span class="stat-num" id="s-available">0</span></span>
  <span>Sold: <span class="stat-num" id="s-sold">0</span></span>
  <span>Reserved: <span class="stat-num" id="s-reserved">0</span></span>
</div>

<script>
const LOT_DATA = [{"id": 1, "acres": 1.08}, {"id": 2, "acres": 0.84}, {"id": 3, "acres": 0.92}, {"id": 4, "acres": 0.99}, {"id": 5, "acres": 0.92}, {"id": 6, "acres": 0.92}, {"id": 7, "acres": 0.99}, {"id": 8, "acres": 0.92}, {"id": 9, "acres": 1.46}, {"id": 10, "acres": 1.52}, {"id": 11, "acres": 1.03}, {"id": 12, "acres": 0.85}, {"id": 13, "acres": 0.93}, {"id": 14, "acres": 0.92}, {"id": 15, "acres": 0.92}, {"id": 16, "acres": 0.92}, {"id": 17, "acres": 0.98}, {"id": 18, "acres": 0.98}, {"id": 19, "acres": 1.16}];
const statuses = {};
LOT_DATA.forEach(l => statuses[l.id] = 'available');
let selectedId = null, currentFilter = 'all';
let scale = 1, panX = 0, panY = 0, isPanning = false, startPX, startPY;
const VB_W = 1240, VB_H = 1000;

function init() {
  document.querySelectorAll('.lot').forEach(el => el.addEventListener('click', onLotClick));
  initPanZoom();
  updateStats();
}

function onLotClick(e) {
  e.stopPropagation();
  selectLot(parseInt(e.currentTarget.dataset.lot));
}

function selectLot(id) {
  document.querySelectorAll('.lot.selected').forEach(el => el.classList.remove('selected'));
  selectedId = id;
  const el = document.getElementById('lot-' + id);
  if (el) el.classList.add('selected');
  const lot = LOT_DATA.find(l => l.id === id);
  document.getElementById('no-sel').style.display = 'none';
  document.getElementById('lot-info').classList.add('show');
  document.getElementById('d-num').textContent = 'Lot ' + id;
  document.getElementById('d-acres').textContent = lot ? lot.acres + ' ac' : '—';
  renderBadge(statuses[id]);
}

function renderBadge(status) {
  const labels = { available: 'Available', sold: 'Sold', reserved: 'Reserved' };
  const cls = { available: 'badge-available', sold: 'badge-sold', reserved: 'badge-reserved' };
  document.getElementById('d-badge').innerHTML = `<span class="status-badge ${cls[status]}">${labels[status]}</span>`;
}

function setStatus(status) {
  if (!selectedId) return;
  statuses[selectedId] = status;
  const el = document.getElementById('lot-' + selectedId);
  if (el) { el.classList.remove('available','sold','reserved'); el.classList.add(status); }
  renderBadge(status);
  updateStats();
  applyFilter(currentFilter);
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.toolbar .btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + filter).classList.add('active');
  applyFilter(filter);
}

function applyFilter(filter) {
  document.querySelectorAll('.lot').forEach(el => {
    const id = parseInt(el.dataset.lot);
    el.classList.toggle('dimmed', filter !== 'all' && statuses[id] !== filter);
  });
}

function updateStats() {
  const vals = Object.values(statuses);
  document.getElementById('s-total').textContent = LOT_DATA.length;
  document.getElementById('s-available').textContent = vals.filter(s => s === 'available').length;
  document.getElementById('s-sold').textContent = vals.filter(s => s === 'sold').length;
  document.getElementById('s-reserved').textContent = vals.filter(s => s === 'reserved').length;
}

function applyTransform() {
  document.getElementById('map-svg').setAttribute('viewBox',
    `${-20/scale - panX/scale} ${-20/scale - panY/scale} ${VB_W/scale} ${VB_H/scale}`);
}

function adjustZoom(factor) {
  const svg = document.getElementById('map-svg');
  const rect = svg.getBoundingClientRect();
  const cx = rect.width/2, cy = rect.height/2;
  const old = scale;
  scale = Math.min(Math.max(scale*factor, 0.3), 10);
  const r = scale/old;
  panX = cx - r*(cx - panX);
  panY = cy - r*(cy - panY);
  applyTransform();
}

function resetView() {
  scale = 1; panX = 0; panY = 0;
  document.getElementById('map-svg').setAttribute('viewBox', '-20 -20 1240 1000');
}

function initPanZoom() {
  const svg = document.getElementById('map-svg');
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const f = e.deltaY < 0 ? 1.12 : 0.88;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const old = scale;
    scale = Math.min(Math.max(scale*f, 0.3), 10);
    const r = scale/old;
    panX = mx - r*(mx - panX);
    panY = my - r*(my - panY);
    applyTransform();
  }, { passive: false });

  svg.addEventListener('mousedown', e => {
    if (e.target.classList.contains('lot')) return;
    isPanning = true;
    startPX = e.clientX - panX;
    startPY = e.clientY - panY;
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = e.clientX - startPX;
    panY = e.clientY - startPY;
    applyTransform();
  });
  window.addEventListener('mouseup', () => { isPanning = false; });
}

document.getElementById('map-svg').addEventListener('click', e => {
  if (!e.target.classList.contains('lot')) {
    document.querySelectorAll('.lot.selected').forEach(el => el.classList.remove('selected'));
    selectedId = null;
    document.getElementById('no-sel').style.display = 'block';
    document.getElementById('lot-info').classList.remove('show');
  }
});

init();
</script>
