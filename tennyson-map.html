<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennyson Neighborhood - Lawrence Rd</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f1eb;
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #2c3e28;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header .title-group { text-align: left; }
  header h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    color: #a8c490;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .meta {
    font-size: 11px;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .toolbar {
    background: #fff;
    border-bottom: 1px solid #e0ddd6;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1.5px solid #c5bfb2;
    background: #fff;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    color: #555;
  }
  .btn:hover { border-color: #3a4a2e; color: #3a4a2e; }
  .btn.active { background: #3a4a2e; color: #fff; border-color: #3a4a2e; }
  .legend {
    display: flex;
    gap: 14px;
    margin-left: auto;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.5px;
  }
  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  .map-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #eae6dc;
  }
  svg {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  svg:active { cursor: grabbing; }

  /* Map geometry */
  .road-fill {
    fill: none;
    stroke: #cac4b4;
    stroke-width: 22;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .road-edge {
    fill: none;
    stroke: #b5ad9e;
    stroke-width: 1;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .prop-boundary {
    fill: none;
    stroke: #8a7e6e;
    stroke-width: 1.2;
    stroke-dasharray: 6,4;
    opacity: 0.5;
  }
  .lot {
    fill: #ccd9b8;
    stroke: #8a9e72;
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.15s, stroke-width 0.15s;
  }
  .lot:hover {
    fill: #b8cda0;
    stroke-width: 2.5;
    stroke: #6a8a52;
  }
  .lot.selected {
    stroke: #2c3e28;
    stroke-width: 3;
    filter: drop-shadow(0 0 6px rgba(44,62,40,0.4));
  }
  .lot.available { fill: #ccd9b8; }
  .lot.sold { fill: #e8c0b8; }
  .lot.reserved { fill: #e8dca0; }
  .lot.dimmed { opacity: 0.2; }

  .lot-label-group { pointer-events: none; }
  .lot-label-num {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    fill: #3a4a2e;
    text-anchor: middle;
    dominant-baseline: middle;
    letter-spacing: 0.5px;
  }
  .lot-label-acres {
    font-family: 'Montserrat', sans-serif;
    font-size: 7px;
    font-weight: 400;
    fill: #6b7a5a;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  /* Info panel */
  .info-panel {
    width: 260px;
    background: #fff;
    border-left: 1px solid #e0ddd6;
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    font-weight: 600;
    color: #3a4a2e;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .placeholder {
    color: #aaa;
    font-size: 12px;
    line-height: 1.6;
  }
  .lot-info { display: none; }
  .lot-info.show { display: block; }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0ede8;
    font-size: 12px;
  }
  .info-key {
    color: #999;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .info-value {
    font-weight: 600;
    color: #3a4a2e;
  }
  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    margin: 12px 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-available { background: #d4edda; color: #1a6030; border: 1px solid #8a9e72; }
  .badge-sold { background: #f0d0d0; color: #7a1010; border: 1px solid #c08080; }
  .badge-reserved { background: #fff3cd; color: #7a5c00; border: 1px solid #d4b84a; }
  .status-btns {
    display: flex;
    gap: 6px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .status-btn {
    padding: 6px 14px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 16px;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.12s;
  }
  .status-btn-available { background: #d4edda; border: 1.5px solid #8a9e72; color: #1a6030; }
  .status-btn-available:hover { background: #b0d8b0; }
  .status-btn-sold { background: #f0d0d0; border: 1.5px solid #c08080; color: #7a1010; }
  .status-btn-sold:hover { background: #e0a0a0; }
  .status-btn-reserved { background: #fff3cd; border: 1.5px solid #d4b84a; color: #7a5c00; }
  .status-btn-reserved:hover { background: #f0e090; }

  .stats-bar {
    background: #fff;
    border-top: 1px solid #e0ddd6;
    padding: 8px 24px;
    display: flex;
    gap: 28px;
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .stat-num { font-weight: 700; color: #3a4a2e; }

  .zoom-controls {
    position: absolute;
    bottom: 20px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    z-index: 10;
  }
  .zoom-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid #c5bfb2;
    background: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    color: #555;
  }
  .zoom-btn:hover { background: #f0f4e8; border-color: #3a4a2e; color: #3a4a2e; }

  .export-note {
    font-size: 10px;
    color: #bbb;
    margin-top: 20px;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }
</style>
</head>

="1104.5" y="812.9" class="lot-label-num">Lot 36</text><text x="1104.5" y="826.9" class="lot-label-acres">2.06 ac</text></g><g class="lot-label-group" data-lot="37"><text x="949.2" y="875.0" class="lot-label-num">Lot 37</text><text x="949.2" y="889.0" class="lot-label-acres">0.96 ac</text></g><g class="lot-label-group" data-lot="38"><text x="998.2" y="880.9" class="lot-label-num">Lot 38</text><text x="998.2" y="894.9" class="lot-label-acres">0.96 ac</text></g><g class="lot-label-group" data-lot="39"><text x="1047.3" y="886.9" class="lot-label-num">Lot 39</text><text x="1047.3" y="900.9" class="lot-label-acres">0.96 ac</text></g>

  <div class="info-panel">
    <div class="panel-title">Lot Details</div>
    <div class="placeholder" id="no-sel">Click any lot on the map to see details and change its status.</div>
    <div class="lot-info" id="lot-info">
      <div class="info-row"><span class="info-key">Lot</span><span class="info-value" id="d-num">&mdash;</span></div>
      <div class="info-row"><span class="info-key">Acreage</span><span class="info-value" id="d-acres">&mdash;</span></div>
      <div id="d-badge"></div>
      <div class="status-btns">
        <button class="status-btn status-btn-available" onclick="setStatus('available')">Available</button>
        <button class="status-btn status-btn-sold" onclick="setStatus('sold')">Sold</button>
        <button class="status-btn status-btn-reserved" onclick="setStatus('reserved')">Reserved</button>
      </div>
    </div>

      Status changes are in-memory only. Integrate with your CMS to persist lot data.

<div class="stats-bar">
  <span>Total: <span class="stat-num" id="s-total">0</span></span>
  <span>Available: <span class="stat-num" id="s-available">0</span></span>
  <span>Sold: <span class="stat-num" id="s-sold">0</span></span>
  <span>Reserved: <span class="stat-num" id="s-reserved">0</span></span>
</div>

<script>
const LOT_DATA = [{"id": 1, "acres": 3.59, "cx": 1007.5, "cy": 132.0}, {"id": 2, "acres": 1.05, "cx": 887.3, "cy": 141.5}, {"id": 3, "acres": 1.24, "cx": 1127.1, "cy": 170.9}, {"id": 4, "acres": 0.97, "cx": 391.9, "cy": 183.7}, {"id": 5, "acres": 0.97, "cx": 324.9, "cy": 191.4}, {"id": 6, "acres": 3.23, "cx": 513.5, "cy": 199.4}, {"id": 7, "acres": 0.99, "cx": 242.1, "cy": 202.5}, {"id": 8, "acres": 1.05, "cx": 860.9, "cy": 209.2}, {"id": 9, "acres": 1.2, "cx": 1027.7, "cy": 260.3}, {"id": 10, "acres": 3.0, "cx": 162.7, "cy": 271.7}, {"id": 11, "acres": 1.13, "cx": 831.4, "cy": 280.1}, {"id": 12, "acres": 0.99, "cx": 622.0, "cy": 284.2}, {"id": 13, "acres": 1.7, "cx": 707.8, "cy": 290.7}, {"id": 14, "acres": 1.05, "cx": 942.6, "cy": 316.0}, {"id": 15, "acres": 0.97, "cx": 303.1, "cy": 321.7}, {"id": 16, "acres": 0.94, "cx": 416.5, "cy": 337.5}, {"id": 17, "acres": 0.96, "cx": 364.6, "cy": 340.1}, {"id": 18, "acres": 1.01, "cx": 1022.6, "cy": 340.1}, {"id": 19, "acres": 0.92, "cx": 471.9, "cy": 346.5}, {"id": 20, "acres": 1.13, "cx": 794.9, "cy": 366.4}, {"id": 21, "acres": 1.03, "cx": 526.1, "cy": 375.5}, {"id": 22, "acres": 3.51, "cx": 281.4, "cy": 407.6}, {"id": 23, "acres": 1.02, "cx": 578.3, "cy": 417.9}, {"id": 24, "acres": 1.07, "cx": 876.8, "cy": 435.5}, {"id": 25, "acres": 3.51, "cx": 1072.7, "cy": 462.8}, {"id": 26, "acres": 0.96, "cx": 925.8, "cy": 469.0}, {"id": 27, "acres": 1.32, "cx": 621.8, "cy": 472.0}, {"id": 28, "acres": 0.96, "cx": 972.1, "cy": 490.0}, {"id": 29, "acres": 2.15, "cx": 950.8, "cy": 580.3}, {"id": 30, "acres": 0.48, "cx": 862.6, "cy": 619.9}, {"id": 31, "acres": 0.95, "cx": 968.9, "cy": 695.4}, {"id": 32, "acres": 0.54, "cx": 921.9, "cy": 698.4}, {"id": 33, "acres": 0.95, "cx": 1016.0, "cy": 701.1}, {"id": 34, "acres": 0.95, "cx": 1063.2, "cy": 706.8}, {"id": 35, "acres": 0.3, "cx": 1015.3, "cy": 785.4}, {"id": 36, "acres": 2.06, "cx": 1104.5, "cy": 816.9}, {"id": 37, "acres": 0.96, "cx": 949.2, "cy": 879.0}, {"id": 38, "acres": 0.96, "cx": 998.2, "cy": 884.9}, {"id": 39, "acres": 0.96, "cx": 1047.3, "cy": 890.9}];
const statuses = {};
LOT_DATA.forEach(l => statuses[l.id] = 'available');

let selectedId = null;
let currentFilter = 'all';
let scale = 1, panX = 0, panY = 0;
let isPanning = false, startPX, startPY;

function init() {
  document.querySelectorAll('.lot').forEach(el => {
    el.addEventListener('click', onLotClick);
  });
  initPanZoom();
  updateStats();
}

function onLotClick(e) {
  e.stopPropagation();
  selectLot(parseInt(e.currentTarget.dataset.lot));
}

function selectLot(id) {
  document.querySelectorAll('.lot.selected').forEach(el => el.classList.remove('selected'));
  selectedId = id;
  const el = document.getElementById('lot-' + id);
  if (el) el.classList.add('selected');

  const lot = LOT_DATA.find(l => l.id === id);
  document.getElementById('no-sel').style.display = 'none';
  document.getElementById('lot-info').classList.add('show');
  document.getElementById('d-num').textContent = 'Lot ' + id;
  document.getElementById('d-acres').textContent = lot ? lot.acres + ' ac' : '—';
  renderBadge(statuses[id]);
}

function renderBadge(status) {
  const labels = { available: 'Available', sold: 'Sold', reserved: 'Reserved' };
  const classes = { available: 'badge-available', sold: 'badge-sold', reserved: 'badge-reserved' };
  document.getElementById('d-badge').innerHTML =
    `<span class="status-badge ${classes[status]}">${labels[status]}</span>`;
}

function setStatus(status) {
  if (!selectedId) return;
  statuses[selectedId] = status;
  const el = document.getElementById('lot-' + selectedId);
  if (el) {
    el.classList.remove('available', 'sold', 'reserved');
    el.classList.add(status);
  }
  renderBadge(status);
  updateStats();
  applyFilter(currentFilter);
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.toolbar .btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + filter).classList.add('active');
  applyFilter(filter);
}

function applyFilter(filter) {
  document.querySelectorAll('.lot').forEach(el => {
    const id = parseInt(el.dataset.lot);
    const match = filter === 'all' || statuses[id] === filter;
    el.classList.toggle('dimmed', !match);
  });
}

function updateStats() {
  const vals = Object.values(statuses);
  document.getElementById('s-total').textContent = LOT_DATA.length;
  document.getElementById('s-available').textContent = vals.filter(s => s === 'available').length;
  document.getElementById('s-sold').textContent = vals.filter(s => s === 'sold').length;
  document.getElementById('s-reserved').textContent = vals.filter(s => s === 'reserved').length;
}

function applyTransform() {
  const g = document.getElementById('map-svg');
  g.setAttribute('viewBox',
    `${-20 / scale - panX / scale} ${-20 / scale - panY / scale} ${(1200 + 40) / scale} ${(1033 + 40) / scale}`
  );
}

function adjustZoom(factor) {
  const svg = document.getElementById('map-svg');
  const rect = svg.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const oldScale = scale;
  scale = Math.min(Math.max(scale * factor, 0.3), 10);
  const ratio = scale / oldScale;
  panX = cx - ratio * (cx - panX);
  panY = cy - ratio * (cy - panY);
  applyTransform();
}

function resetView() {
  scale = 1; panX = 0; panY = 0;
  const svg = document.getElementById('map-svg');
  svg.setAttribute('viewBox', '-20 -20 1240 1073');
}

function initPanZoom() {
  const svg = document.getElementById('map-svg');

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.88;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const oldScale = scale;
    scale = Math.min(Math.max(scale * factor, 0.3), 10);
    const ratio = scale / oldScale;
    panX = mx - ratio * (mx - panX);
    panY = my - ratio * (my - panY);
    applyTransform();
  }, { passive: false });

  svg.addEventListener('mousedown', e => {
    if (e.target.classList.contains('lot')) return;
    isPanning = true;
    startPX = e.clientX - panX;
    startPY = e.clientY - panY;
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = e.clientX - startPX;
    panY = e.clientY - startPY;
    applyTransform();
  });

  window.addEventListener('mouseup', () => { isPanning = false; });
}

document.getElementById('map-svg').addEventListener('click', e => {
  if (!e.target.classList.contains('lot')) {
    document.querySelectorAll('.lot.selected').forEach(el => el.classList.remove('selected'));
    selectedId = null;
    document.getElementById('no-sel').style.display = 'block';
    document.getElementById('lot-info').classList.remove('show');
  }
});

init();
</script>
